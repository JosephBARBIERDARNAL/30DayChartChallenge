[project]
site_name = "30DayChartChallenge"
repo_url = "https://github.com/JosephBARBIERDARNAL/30DayChartChallenge"
site_url = "https://y-sunflower.github.io/30DayChartChallenge/"
site_description = "My charts for the 30DayChartChallenge"
site_author = "Joseph Barbier"
copyright = """
Copyright &copy; 2026 Joseph Barbier
"""
docs_dir = "src"
extra_css = ["stylesheets/extra.css"]
nav = [
  { "Home" = "index.md" },
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.tabs",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "navigation.prune",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/JosephBARBIERDARNAL/30DayChartChallenge"
